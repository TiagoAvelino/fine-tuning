# Fine-tuning config for OpenShift troubleshooting LLM
# Uses QLoRA (4-bit) on TinyLlama-1.1B-Chat-v1.0
#
# Run:
#   python -m src.train --config config/ocp-instruct.yaml
#
# For multi-GPU:
#   accelerate launch -m src.train --config config/ocp-instruct.yaml

model:
  name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
  attn_implementation: "sdpa"
  quantization:
    mode: "4bit"
    quant_type: "nf4"
    compute_dtype: "bfloat16"
    double_quant: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"

dataset:
  local_path: "data/ocp-instructions.jsonl"
  instruction_field: "instruction"
  response_field: "response"
  eval_ratio: 0.1
  max_samples: 0  # 0 = use all

training:
  output_dir: "outputs/llama-qlora"
  epochs: 3
  batch_size: 4
  eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_seq_length: 1024
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optimizer: "paged_adamw_8bit"
  max_grad_norm: 0.3
  packing: false
  logging_steps: 10
  save_strategy: "no"
  eval_strategy: "steps"
  eval_steps: 200
  report_to: "tensorboard"
  seed: 42
